<script>
let topicsRef = null, postsRef = null;
let topics = {};
let posts = {};
let offlineMode = false;
let offlineTopics = JSON.parse(localStorage.getItem("emba_offline_topics") || "{}");
let offlinePosts = JSON.parse(localStorage.getItem("emba_offline_posts") || "{}");
let idCounter = 0;
let isAdmin = false;

function isConfigured(cfg){ return cfg && cfg.databaseURL && !cfg.databaseURL.includes("請貼上"); }

try{
  if(isConfigured(firebaseConfig)){
    firebase.initializeApp(firebaseConfig);
    topicsRef = firebase.database().ref("topics");
    postsRef = firebase.database().ref("posts");
    topicsRef.on("value", snap => { topics = snap.val() || {}; rerenderCurrentView(); });
    postsRef.on("value", snap => { posts = snap.val() || {}; rerenderCurrentView(); });
  } else {
    throw new Error("no config");
  }
}catch(e){
  offlineMode = true;
  topics = offlineTopics;
  posts = offlinePosts;
  document.getElementById("status-banner").style.display = "block";
}

function newId(prefix){ return prefix + "_" + Date.now() + "_" + (++idCounter); }

function saveTopic(record){
  if(offlineMode){
    const id = newId("t");
    offlineTopics[id] = record;
    localStorage.setItem("emba_offline_topics", JSON.stringify(offlineTopics));
    topics = offlineTopics;
    return id;
  } else {
    const ref = topicsRef.push(record);
    return ref.key;
  }
}
function savePost(record){
  if(offlineMode){
    const id = newId("p");
    offlinePosts[id] = record;
    localStorage.setItem("emba_offline_posts", JSON.stringify(offlinePosts));
    posts = offlinePosts;
    rerenderCurrentView();
    return id;
  } else {
    const ref = postsRef.push(record);
    return ref.key;
  }
}

function collectDescendants(postId, acc){
  acc.push(postId);
  Object.entries(posts).filter(([id,p]) => p.parentId === postId).forEach(([id]) => collectDescendants(id, acc));
  return acc;
}

function deletePost(postId){
  const post = posts[postId];
  if(!post) return;
  const isOwner = post.author === getUserName();
  if(!isOwner && !isAdmin){ alert("只能刪除自己發表的留言喔"); return; }
  const ids = collectDescendants(postId, []);
  const msg = ids.length > 1
    ? `這則留言底下還有 ${ids.length - 1} 則回覆，刪除後會一併移除，確定嗎？`
    : "確定要刪除這則留言嗎？";
  if(!confirm(msg)) return;

  if(offlineMode){
    ids.forEach(id => delete offlinePosts[id]);
    localStorage.setItem("emba_offline_posts", JSON.stringify(offlinePosts));
    posts = offlinePosts;
    rerenderCurrentView();
  } else {
    const updates = {};
    ids.forEach(id => updates[id] = null);
    postsRef.update(updates);
  }
}

function deleteTopic(topicId){
  if(!isAdmin){ alert("只有管理者可以刪除議題"); return; }
  const t = topics[topicId];
  if(!t) return;
  const relatedPostIds = Object.entries(posts).filter(([id,p]) => p.topicId===topicId).map(([id]) => id);
  const msg = `確定要刪除議題「${t.title}」嗎？底下的 ${relatedPostIds.length} 則留言也會一併刪除，此動作無法復原。`;
  if(!confirm(msg)) return;

  if(offlineMode){
    delete offlineTopics[topicId];
    relatedPostIds.forEach(id => delete offlinePosts[id]);
    localStorage.setItem("emba_offline_topics", JSON.stringify(offlineTopics));
    localStorage.setItem("emba_offline_posts", JSON.stringify(offlinePosts));
    topics = offlineTopics;
    posts = offlinePosts;
    if(currentTopicId === topicId){ document.getElementById("btn-back").click(); } else { rerenderCurrentView(); }
  } else {
    topicsRef.child(topicId).remove();
    if(relatedPostIds.length){
      const updates = {};
      relatedPostIds.forEach(id => updates[id] = null);
      postsRef.update(updates);
    }
    if(currentTopicId === topicId){ document.getElementById("btn-back").click(); }
  }
}

function renameTopic(topicId){
  if(!isAdmin){ alert("只有管理者可以修改議題名稱"); return; }
  const t = topics[topicId];
  if(!t) return;
  const newTitle = prompt("修改議題名稱：", t.title);
  if(newTitle === null) return;
  const trimmed = newTitle.trim();
  if(!trimmed){ alert("議題名稱不可空白"); return; }
  if(offlineMode){
    offlineTopics[topicId] = {...t, title: trimmed};
    localStorage.setItem("emba_offline_topics", JSON.stringify(offlineTopics));
    topics = offlineTopics;
    rerenderCurrentView();
  } else {
    topicsRef.child(topicId).update({title: trimmed});
  }
}

function rerenderCurrentView(){
  updateStats();
  renderSidebar();
  if(document.getElementById("thread-view").style.display === "block" && currentTopicId){
    renderThread(currentTopicId);
  } else {
    renderTopicsList();
  }
}

function getUserName(){ return localStorage.getItem("emba_user_name") || ""; }
function setUserName(name){ localStorage.setItem("emba_user_name", name); document.getElementById("current-name").textContent = name || "設定姓名"; }
document.getElementById("btn-change-name").onclick = () => {
  document.getElementById("name-input").value = getUserName();
  document.getElementById("name-modal-mask").classList.add("open");
};
document.getElementById("name-save").onclick = () => {
  const v = document.getElementById("name-input").value.trim();
  if(v) setUserName(v);
  document.getElementById("name-modal-mask").classList.remove("open");
  rerenderCurrentView();
};
setUserName(getUserName());
if(!getUserName()) document.getElementById("btn-change-name").click();

const adminBtn = document.getElementById("btn-admin-toggle");
adminBtn.onclick = () => {
  if(isAdmin){
    isAdmin = false;
    adminBtn.textContent = "🔐 管理者模式";
    adminBtn.classList.remove("admin-on");
  } else {
    const pw = prompt("請輸入管理者密碼：");
    if(pw === null) return;
    if(pw !== ADMIN_PASSWORD){ alert("密碼錯誤"); return; }
    isAdmin = true;
    adminBtn.textContent = "🔓 管理者模式中";
    adminBtn.classList.add("admin-on");
  }
  rerenderCurrentView();
};

const AVATAR_COLORS = ["#2f6fb0","#1f9fb3","#5470c4","#3d84c9","#7b5fc9","#2e8fa0","#4f9fc9","#4770a0"];
function hashName(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h;
}
function avatarColor(name){ return AVATAR_COLORS[hashName(name||"匿名") % AVATAR_COLORS.length]; }
function avatarHtml(name, size){
  const n = name || "匿名";
  const initial = n.trim().slice(0,1).toUpperCase();
  return `<span class="avatar ${size==='lg'?'lg':''}" style="background:${avatarColor(n)}">${escapeHtml(initial)}</span>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function linkify(escapedText){
  return escapedText.replace(/(https?:\/\/[^\s<]+)/g, url => {
    let clean = url;
    let trailing = "";
    const m = clean.match(/[),.!?;:'"]+$/);
    if(m){ trailing = m[0]; clean = clean.slice(0, -trailing.length); }
    return `<a href="${clean}" target="_blank" rel="noopener noreferrer">${clean}</a>${trailing}`;
  });
}
function fmtTime(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleString("zh-TW", {month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"});
}
function isRecent(ts){
  return !!ts && (Date.now() - ts) < (3 * 24 * 60 * 60 * 1000);
}
function getReplies(topicId, parentId){
  return Object.entries(posts).filter(([id,p]) => p.topicId===topicId && (p.parentId||null)===(parentId||null))
    .sort((a,b) => {
      const pa = a[1].pinned ? 1 : 0, pb = b[1].pinned ? 1 : 0;
      if(pa !== pb) return pb - pa;
      if(pa && pb) return (b[1].pinnedAt||0) - (a[1].pinnedAt||0);
      return (a[1].createdAt||0) - (b[1].createdAt||0);
    });
}
function togglePin(postId){
  if(!isAdmin){ alert("只有管理者可以置頂留言"); return; }
  const post = posts[postId];
  if(!post) return;
  const pinned = !post.pinned;
  const updates = {pinned, pinnedAt: pinned ? Date.now() : null};
  if(offlineMode){
    offlinePosts[postId] = {...post, ...updates};
    localStorage.setItem("emba_offline_posts", JSON.stringify(offlinePosts));
    posts = offlinePosts;
    rerenderCurrentView();
  } else {
    postsRef.child(postId).update(updates);
  }
}
function getTopicStats(topicId){
  const all = Object.values(posts).filter(p => p.topicId===topicId);
  const count = all.length;
  const last = all.reduce((max,p) => Math.max(max, p.createdAt||0), 0);
  return {count, last};
}
function updateStats(){
  document.getElementById("stat-topics").textContent = Object.keys(topics).length;
  document.getElementById("stat-posts").textContent = Object.keys(posts).length;
  const people = new Set();
  Object.values(topics).forEach(t => people.add(t.author||"匿名"));
  Object.values(posts).forEach(p => people.add(p.author||"匿名"));
  document.getElementById("stat-people").textContent = people.size;
}

function renderTopicsList(){
  const q = document.getElementById("topic-search").value.trim().toLowerCase();
  const entries = Object.entries(topics).filter(([id,t]) => !q || t.title.toLowerCase().includes(q));
  entries.sort((a,b) => {
    const sa = getTopicStats(a[0]).last || a[1].createdAt || 0;
    const sb = getTopicStats(b[0]).last || b[1].createdAt || 0;
    return sb - sa;
  });
  document.getElementById("topic-count-label").textContent = `共 ${Object.keys(topics).length} 個議題`;
  const list = document.getElementById("topics-list");
  if(entries.length === 0){
    list.innerHTML = '<div class="empty-hint"><span class="big">🏁</span>還沒有議題，點右上角「＋ 新增議題」開始討論吧！</div>';
    return;
  }
  list.innerHTML = entries.map(([id,t]) => {
    const stats = getTopicStats(id);
    const rootPost = getReplies(id, null)[0];
    const preview = rootPost ? rootPost[1].content : "（尚無留言，點擊加入討論）";
    const recent = isRecent(stats.last || t.createdAt);
    return `
      <div class="topic-card ${recent ? 'is-recent' : ''}" data-topic-id="${id}">
        ${isAdmin ? `
        <div class="topic-admin-actions">
          <button class="topic-rename-btn" data-topic-id="${id}">✏️ 修改</button>
          <button class="topic-delete-btn" data-topic-id="${id}">🗑 刪除</button>
        </div>` : ""}
        <h3 class="${isAdmin ? 'has-admin-actions' : ''}">${escapeHtml(t.title)} ${recent ? '<span class="new-badge">🆕 3天內有新動態</span>' : ""}</h3>
        <div class="preview">${escapeHtml(preview)}</div>
        <div class="meta">
          ${avatarHtml(t.author)}
          <span>發起人：<b>${escapeHtml(t.author||"匿名")}</b></span>
          <span>💬 留言數：<b>${stats.count}</b></span>
          <span>🕒 最後更新：${fmtTime(stats.last || t.createdAt)}</span>
        </div>
      </div>
    `;
  }).join("");
  list.querySelectorAll(".topic-card").forEach(card => {
    card.addEventListener("click", () => openThread(card.dataset.topicId));
  });
  list.querySelectorAll(".topic-delete-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      deleteTopic(btn.dataset.topicId);
    });
  });
  list.querySelectorAll(".topic-rename-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      renameTopic(btn.dataset.topicId);
    });
  });
}
document.getElementById("topic-search").addEventListener("input", renderTopicsList);

function renderSidebar(){
  const list = document.getElementById("sidebar-topics-list");
  const entries = Object.entries(topics).sort((a,b) => {
    const sa = getTopicStats(a[0]).last || a[1].createdAt || 0;
    const sb = getTopicStats(b[0]).last || b[1].createdAt || 0;
    return sb - sa;
  });
  if(entries.length === 0){
    list.innerHTML = '<div class="sidebar-empty">尚無議題</div>';
    return;
  }
  list.innerHTML = entries.map(([id,t]) => {
    const stats = getTopicStats(id);
    const active = currentTopicId === id;
    return `
      <div class="sidebar-topic ${active ? 'active' : ''}" data-topic-id="${id}">
        <span class="sidebar-topic-dot" style="background:${avatarColor(t.title)}"></span>
        <div class="sidebar-topic-info">
          <div class="sidebar-topic-title">${escapeHtml(t.title)}</div>
          <div class="sidebar-topic-meta">💬 ${stats.count}・${fmtTime(stats.last || t.createdAt)}</div>
        </div>
      </div>
    `;
  }).join("");
  list.querySelectorAll(".sidebar-topic").forEach(el => {
    el.addEventListener("click", () => openThread(el.dataset.topicId));
  });
}

document.getElementById("sidebar-overview").addEventListener("click", () => showTopicsOverview());

document.getElementById("btn-new-topic").onclick = () => {
  document.getElementById("new-topic-title").value = "";
  document.getElementById("new-topic-mask").classList.add("open");
};
document.getElementById("new-topic-cancel").onclick = () => document.getElementById("new-topic-mask").classList.remove("open");
document.getElementById("new-topic-submit").onclick = () => {
  const title = document.getElementById("new-topic-title").value.trim();
  if(!title){ alert("請輸入議題標題"); return; }
  const author = getUserName() || "匿名";
  const topicId = saveTopic({title, author, createdAt: Date.now()});
  document.getElementById("new-topic-mask").classList.remove("open");
  rerenderCurrentView();
  if(!offlineMode){ setTimeout(() => openThread(topicId), 300); } else { openThread(topicId); }
};

let currentTopicId = null;

function openThread(topicId){
  currentTopicId = topicId;
  document.getElementById("topics-view").style.display = "none";
  document.getElementById("thread-view").style.display = "block";
  document.getElementById("top-reply-content").value = "";
  renderThread(topicId);
  renderSidebar();
}
function showTopicsOverview(){
  currentTopicId = null;
  document.getElementById("thread-view").style.display = "none";
  document.getElementById("topics-view").style.display = "block";
  renderTopicsList();
  renderSidebar();
}
document.getElementById("btn-back").onclick = showTopicsOverview;

function renderThread(topicId){
  const t = topics[topicId];
  if(!t){ document.getElementById("btn-back").click(); return; }
  const stats = getTopicStats(topicId);
  document.getElementById("thread-title").textContent = t.title;
  document.getElementById("thread-meta").innerHTML =
    `${avatarHtml(t.author)} 發起人：${escapeHtml(t.author||"匿名")} ・ 建立於 ${fmtTime(t.createdAt)} ・ 共 ${stats.count} 則留言`;
  document.getElementById("posts-container").innerHTML = renderPostTree(topicId, null, 0);
  attachPostEvents();

  const deleteTopicBtn = document.getElementById("btn-delete-topic");
  deleteTopicBtn.style.display = isAdmin ? "inline-block" : "none";
  deleteTopicBtn.onclick = () => deleteTopic(topicId);

  const renameTopicBtn = document.getElementById("btn-rename-topic");
  renameTopicBtn.style.display = isAdmin ? "inline-block" : "none";
  renameTopicBtn.onclick = () => renameTopic(topicId);
}

function renderPostTree(topicId, parentId, depth){
  const replies = getReplies(topicId, parentId);
  if(replies.length === 0) return "";
  const depthColor = AVATAR_COLORS[depth % AVATAR_COLORS.length];
  return replies.map(([id,p]) => {
    const canDelete = (p.author === getUserName()) || isAdmin;
    const recent = isRecent(p.createdAt);
    const pinned = !!p.pinned;
    return `
    <div class="post" data-post-id="${id}" style="--depth-color:${depthColor}">
      <div class="post-card ${recent ? 'is-recent' : ''} ${pinned ? 'is-pinned' : ''}">
        <div class="post-meta">${avatarHtml(p.author)}<span class="author">${escapeHtml(p.author||"匿名")}</span><span>${fmtTime(p.createdAt)}</span>${pinned ? '<span class="pinned-badge">📌 置頂</span>' : ""}${recent ? '<span class="new-badge">🆕 New</span>' : ""}</div>
        <div class="post-content">${linkify(escapeHtml(p.content))}</div>
        <div class="post-actions">
          <button class="reply-toggle-btn">↩ 回覆</button>
          ${isAdmin ? `<button class="pin-post-btn">${pinned ? '📌 取消置頂' : '📌 置頂'}</button>` : ""}
          ${canDelete ? `<button class="delete-post-btn danger-text">🗑 刪除${isAdmin && p.author!==getUserName() ? "（管理者）" : ""}</button>` : ""}
        </div>
        <div class="reply-box">
          <textarea rows="2" placeholder="回覆 ${escapeHtml(p.author||"匿名")} 的留言…"></textarea>
          <button class="btn primary small reply-submit-btn" style="background:var(--accent-dark);color:#fff;border-color:var(--accent-dark);text-shadow:0 1px 2px rgba(0,0,0,.35);">送出回覆</button>
        </div>
      </div>
      <div class="children">${renderPostTree(topicId, id, depth+1)}</div>
    </div>
  `;
  }).join("");
}

function attachPostEvents(){
  document.querySelectorAll(".reply-toggle-btn").forEach(btn => {
    btn.onclick = () => {
      const box = btn.closest(".post-card").querySelector(".reply-box");
      box.classList.toggle("open");
    };
  });
  document.querySelectorAll(".reply-submit-btn").forEach(btn => {
    btn.onclick = () => {
      const postEl = btn.closest(".post");
      const parentId = postEl.dataset.postId;
      const textarea = btn.closest(".reply-box").querySelector("textarea");
      const content = textarea.value.trim();
      if(!content){ alert("請輸入回覆內容"); return; }
      const author = getUserName() || "匿名";
      savePost({topicId: currentTopicId, parentId, author, content, createdAt: Date.now()});
      textarea.value = "";
      if(offlineMode) renderThread(currentTopicId);
    };
  });
  document.querySelectorAll(".delete-post-btn").forEach(btn => {
    btn.onclick = () => {
      const postId = btn.closest(".post").dataset.postId;
      deletePost(postId);
    };
  });
  document.querySelectorAll(".pin-post-btn").forEach(btn => {
    btn.onclick = () => {
      const postId = btn.closest(".post").dataset.postId;
      togglePin(postId);
    };
  });
}

document.getElementById("btn-top-reply").onclick = () => {
  const textarea = document.getElementById("top-reply-content");
  const content = textarea.value.trim();
  if(!content){ alert("請輸入留言內容"); return; }
  const author = getUserName() || "匿名";
  savePost({topicId: currentTopicId, parentId: null, author, content, createdAt: Date.now()});
  textarea.value = "";
  if(offlineMode) renderThread(currentTopicId);
};

document.getElementById("btn-export-excel").onclick = () => {
  const topicIds = Object.keys(topics);
  if(topicIds.length === 0){ alert("目前還沒有任何議題可以匯出"); return; }

  const overviewRows = topicIds.map(id => {
    const t = topics[id];
    const stats = getTopicStats(id);
    return {
      "議題標題": t.title,
      "發起人": t.author || "",
      "建立時間": fmtTime(t.createdAt),
      "留言數": stats.count,
      "最後更新": fmtTime(stats.last || t.createdAt)
    };
  });

  const detailRows = [];
  topicIds.forEach(topicId => {
    const t = topics[topicId];
    function walk(parentId, depth, replyToAuthor){
      getReplies(topicId, parentId).forEach(([id,p]) => {
        const indent = "　".repeat(depth) + (depth > 0 ? "↳ " : "");
        detailRows.push({
          "議題": t.title,
          "層級": depth,
          "內容": indent + p.content,
          "發言人": p.author || "",
          "回覆對象": depth === 0 ? "(議題本身)" : replyToAuthor,
          "發表時間": fmtTime(p.createdAt)
        });
        walk(id, depth+1, p.author);
      });
    }
    walk(null, 0, "");
  });

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.json_to_sheet(overviewRows);
  ws1["!cols"] = [{wch:28},{wch:14},{wch:16},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws1, "議題總覽");

  const ws2 = XLSX.utils.json_to_sheet(detailRows);
  ws2["!cols"] = [{wch:24},{wch:6},{wch:50},{wch:12},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws2, "討論明細");

  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `全國EMBA馬拉松_討論串整理_${today}.xlsx`);
};

updateStats();
renderTopicsList();
renderSidebar();
</script>
