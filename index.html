<style>
  :root{
    --bg:#f7f4ee; --ink:#2b2b2b; --muted:#8a8579; --line:#e8e2d4;
    --accent:#e0522f; --accent2:#2f8f6e; --accent3:#3a6fb0; --accent4:#c98a2e;
    --accent-light:#fbe2d8;
    --card:#ffffff; --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(circle at 10% 0%, #fdece2 0%, transparent 45%),
      radial-gradient(circle at 90% 10%, #e4f3ec 0%, transparent 40%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
  }
  header{
    padding:28px 24px 18px; text-align:center; position:relative; overflow:hidden;
    background:linear-gradient(120deg,#e0522f 0%, #c9412a 55%, #a8331f 100%);
    color:#fff;
  }
  header::after{
    content:""; display:block; height:6px; margin-top:18px;
    background-image:repeating-linear-gradient(90deg,#fff 0 18px, transparent 18px 32px);
    opacity:.55;
  }
  header h1{ margin:0 0 6px; font-size:1.55rem; letter-spacing:.5px; text-shadow:0 2px 6px rgba(0,0,0,.15);}
  header p{ margin:0; opacity:.92; font-size:.9rem;}
  .topbar{ display:flex; justify-content:center; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .btn{
    border:1px solid rgba(255,255,255,.6); background:rgba(255,255,255,.14); color:#fff;
    padding:8px 16px; border-radius:999px; cursor:pointer; font-size:.85rem; transition:.15s;
    backdrop-filter:blur(2px);
  }
  .btn:hover{ background:rgba(255,255,255,.28); transform:translateY(-1px);}
  .btn:active{ transform:translateY(0) scale(.97); }
  .btn.primary{ background:#fff; color:var(--accent); border-color:#fff; font-weight:600;}
  .btn.primary:hover{ background:#fff; opacity:.92; }
  .btn.small{ padding:5px 12px; font-size:.76rem;}
  .btn.ghost{ background:transparent; border-color:var(--line); color:var(--ink); }
  .btn.ghost:hover{ background:#f1ede3; }
  .btn.admin-on{ background:#2f8f6e; border-color:#2f8f6e; color:#fff; font-weight:600; }
  .btn.danger-text{ background:none; border:none; color:#c0392b; padding:0; font-size:.74rem; }

  #status-banner{
    display:none; background:#fdf3d0; color:#8a6d1a; text-align:center;
    padding:8px; font-size:.82rem; border-bottom:1px solid #eadb9c;
  }

  main{ max-width:820px; margin:0 auto; padding:26px 16px 60px; }

  .stat-chips{ display:flex; gap:10px; justify-content:center; margin:-38px auto 22px; flex-wrap:wrap; position:relative; z-index:2;}
  .stat-chip{
    background:#fff; border-radius:14px; padding:10px 18px; box-shadow:0 6px 18px rgba(0,0,0,.08);
    font-size:.8rem; color:var(--muted); text-align:center; min-width:100px;
  }
  .stat-chip b{ display:block; font-size:1.15rem; color:var(--accent); }

  @keyframes fadeInUp{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }

  #topics-view .list-toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px;}
  #topics-view .list-toolbar input{
    border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:.85rem; width:220px; font-family:inherit;
  }
  .topic-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px 14px; margin-bottom:14px; cursor:pointer; transition:.18s;
    border-top:5px solid var(--accent); animation:fadeInUp .35s ease both;
    box-shadow:0 2px 8px rgba(0,0,0,.03); position:relative;
  }
  .topic-card:hover{ transform:translateY(-3px); box-shadow:0 10px 22px rgba(0,0,0,.09);}
  .topic-delete-btn{
    position:absolute; top:14px; right:16px; background:none; border:none; color:#c0392b;
    font-size:.76rem; cursor:pointer; padding:2px 6px; border-radius:6px; opacity:.85;
  }
  .topic-delete-btn:hover{ background:#fbe2d8; opacity:1; }
  .topic-card h3{ margin:0 0 8px; font-size:1.04rem; padding-right:70px; }
  .topic-card .preview{ color:var(--muted); font-size:.85rem; margin-bottom:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topic-card .meta{ font-size:.75rem; color:var(--muted); display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .topic-card .meta b{ color:var(--accent); }
  .empty-hint{ color:var(--muted); font-size:.95rem; text-align:center; padding:50px 0; }
  .empty-hint .big{ font-size:2.4rem; display:block; margin-bottom:10px; }

  .new-badge{
    background:#2f8f6e; color:#fff; font-size:.64rem; font-weight:700;
    padding:2px 8px; border-radius:999px; letter-spacing:.3px; white-space:nowrap;
  }
  .topic-card.is-recent{ box-shadow:0 0 0 2px rgba(47,143,110,.35), 0 2px 8px rgba(0,0,0,.03); }
  .post .post-card.is-recent{ background:#f2faf6; border-color:#b9e2cd; }

  .avatar{
    display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px;
    border-radius:50%; color:#fff; font-size:.68rem; font-weight:700; flex-shrink:0;
  }
  .avatar.lg{ width:30px; height:30px; font-size:.8rem; }

  .modal-mask{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.42); z-index:60; align-items:center; justify-content:center; padding:16px;
  }
  .modal-mask.open{ display:flex; }
  .modal-box{ background:#fff; border-radius:16px; padding:22px; width:min(480px,94vw); animation:fadeInUp .25s ease both; }
  .modal-box h3{ margin-top:0; }
  .modal-box input, .modal-box textarea{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 10px;
    font-size:.9rem; font-family:inherit; margin-bottom:10px; resize:vertical;
  }
  .modal-box input:focus, .modal-box textarea:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; }

  #thread-view{ display:none; }
  .thread-header{ margin-bottom:16px; background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; border-top:5px solid var(--accent3); }
  .thread-header .back-btn{ margin-bottom:10px; }
  .thread-header h2{ margin:0 0 6px; font-size:1.2rem; }
  .thread-header .meta{ color:var(--muted); font-size:.8rem; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  .top-reply-box{ margin:16px 0 22px; background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:14px; }
  .top-reply-box textarea{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px;
    font-size:.88rem; font-family:inherit; resize:vertical; margin-bottom:8px;
  }
  .top-reply-box textarea:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }

  .post{ position:relative; margin-top:12px; animation:fadeInUp .3s ease both; }
  .post .post-card{
    background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 14px;
    box-shadow:0 1px 4px rgba(0,0,0,.03);
  }
  .post .post-meta{ font-size:.74rem; color:var(--muted); margin-bottom:6px; display:flex; gap:8px; align-items:center; }
  .post .post-meta .author{ color:var(--ink); font-weight:600; }
  .post .post-content{ font-size:.9rem; white-space:pre-wrap; margin-bottom:6px; line-height:1.5; }
  .post .post-actions{ display:flex; gap:14px; align-items:center; }
  .post .post-actions button{ background:none; border:none; color:var(--muted); font-size:.76rem; cursor:pointer; padding:0; }
  .post .post-actions button:hover{ color:var(--accent); }
  .reply-box{ display:none; margin-top:8px; }
  .reply-box.open{ display:block; animation:fadeInUp .2s ease both; }
  .reply-box textarea{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:8px 10px;
    font-size:.85rem; font-family:inherit; resize:vertical; margin-bottom:6px;
  }
  .children{ padding-left:16px; margin-left:11px; }
  .children .post{ border-left:3px solid var(--depth-color, var(--line)); padding-left:12px; margin-left:-4px; }

  footer{ text-align:center; color:var(--muted); font-size:.75rem; padding:20px; }
</style>
</head>

<div id="status-banner">⚠️ 尚未連接資料庫：目前為離線示範模式，資料不會與其他人同步（請依教學設定 Firebase）。</div>

<header>
  <h1>🏃 中央漾跑社 2026全國E馬討論區</h1>
  <p>發起議題、串連討論，所有人即時可見，一鍵整理匯出</p>
  <div class="topbar">

  <div class="stat-chips">

    </div>

<script>
let topicsRef = null, postsRef = null;
let topics = {};
let posts = {};
let offlineMode = false;
let offlineTopics = JSON.parse(localStorage.getItem("emba_offline_topics") || "{}");
let offlinePosts = JSON.parse(localStorage.getItem("emba_offline_posts") || "{}");
let idCounter = 0;
let isAdmin = false;

function isConfigured(cfg){ return cfg && cfg.databaseURL && !cfg.databaseURL.includes("請貼上"); }

try{
  if(isConfigured(firebaseConfig)){
    firebase.initializeApp(firebaseConfig);
    topicsRef = firebase.database().ref("topics");
    postsRef = firebase.database().ref("posts");
    topicsRef.on("value", snap => { topics = snap.val() || {}; rerenderCurrentView(); });
    postsRef.on("value", snap => { posts = snap.val() || {}; rerenderCurrentView(); });
  } else {
    throw new Error("no config");
  }
}catch(e){
  offlineMode = true;
  topics = offlineTopics;
  posts = offlinePosts;
  document.getElementById("status-banner").style.display = "block";
}

function newId(prefix){ return prefix + "_" + Date.now() + "_" + (++idCounter); }

function saveTopic(record){
  if(offlineMode){
    const id = newId("t");
    offlineTopics[id] = record;
    localStorage.setItem("emba_offline_topics", JSON.stringify(offlineTopics));
    topics = offlineTopics;
    return id;
  } else {
    const ref = topicsRef.push(record);
    return ref.key;
  }
}
function savePost(record){
  if(offlineMode){
    const id = newId("p");
    offlinePosts[id] = record;
    localStorage.setItem("emba_offline_posts", JSON.stringify(offlinePosts));
    posts = offlinePosts;
    rerenderCurrentView();
    return id;
  } else {
    const ref = postsRef.push(record);
    return ref.key;
  }
}

function collectDescendants(postId, acc){
  acc.push(postId);
  Object.entries(posts).filter(([id,p]) => p.parentId === postId).forEach(([id]) => collectDescendants(id, acc));
  return acc;
}

function deletePost(postId){
  const post = posts[postId];
  if(!post) return;
  const isOwner = post.author === getUserName();
  if(!isOwner && !isAdmin){ alert("只能刪除自己發表的留言喔"); return; }
  const ids = collectDescendants(postId, []);
  const msg = ids.length > 1
    ? `這則留言底下還有 ${ids.length - 1} 則回覆，刪除後會一併移除，確定嗎？`
    : "確定要刪除這則留言嗎？";
  if(!confirm(msg)) return;

  if(offlineMode){
    ids.forEach(id => delete offlinePosts[id]);
    localStorage.setItem("emba_offline_posts", JSON.stringify(offlinePosts));
    posts = offlinePosts;
    rerenderCurrentView();
  } else {
    const updates = {};
    ids.forEach(id => updates[id] = null);
    postsRef.update(updates);
  }
}

function deleteTopic(topicId){
  if(!isAdmin){ alert("只有管理者可以刪除議題"); return; }
  const t = topics[topicId];
  if(!t) return;
  const relatedPostIds = Object.entries(posts).filter(([id,p]) => p.topicId===topicId).map(([id]) => id);
  const msg = `確定要刪除議題「${t.title}」嗎？底下的 ${relatedPostIds.length} 則留言也會一併刪除，此動作無法復原。`;
  if(!confirm(msg)) return;

  if(offlineMode){
    delete offlineTopics[topicId];
    relatedPostIds.forEach(id => delete offlinePosts[id]);
    localStorage.setItem("emba_offline_topics", JSON.stringify(offlineTopics));
    localStorage.setItem("emba_offline_posts", JSON.stringify(offlinePosts));
    topics = offlineTopics;
    posts = offlinePosts;
    if(currentTopicId === topicId){ document.getElementById("btn-back").click(); } else { rerenderCurrentView(); }
  } else {
    topicsRef.child(topicId).remove();
    if(relatedPostIds.length){
      const updates = {};
      relatedPostIds.forEach(id => updates[id] = null);
      postsRef.update(updates);
    }
    if(currentTopicId === topicId){ document.getElementById("btn-back").click(); }
  }
}

function rerenderCurrentView(){
  updateStats();
  if(document.getElementById("thread-view").style.display === "block" && currentTopicId){
    renderThread(currentTopicId);
  } else {
    renderTopicsList();
  }
}

function getUserName(){ return localStorage.getItem("emba_user_name") || ""; }
function setUserName(name){ localStorage.setItem("emba_user_name", name); document.getElementById("current-name").textContent = name || "設定姓名"; }
document.getElementById("btn-change-name").onclick = () => {
  document.getElementById("name-input").value = getUserName();
  document.getElementById("name-modal-mask").classList.add("open");
};
document.getElementById("name-save").onclick = () => {
  const v = document.getElementById("name-input").value.trim();
  if(v) setUserName(v);
  document.getElementById("name-modal-mask").classList.remove("open");
  rerenderCurrentView();
};
setUserName(getUserName());
if(!getUserName()) document.getElementById("btn-change-name").click();

const adminBtn = document.getElementById("btn-admin-toggle");
adminBtn.onclick = () => {
  if(isAdmin){
    isAdmin = false;
    adminBtn.textContent = "🔐 管理者模式";
    adminBtn.classList.remove("admin-on");
  } else {
    const pw = prompt("請輸入管理者密碼：");
    if(pw === null) return;
    if(pw !== ADMIN_PASSWORD){ alert("密碼錯誤"); return; }
    isAdmin = true;
    adminBtn.textContent = "🔓 管理者模式中";
    adminBtn.classList.add("admin-on");
  }
  rerenderCurrentView();
};

const AVATAR_COLORS = ["#e0522f","#2f8f6e","#3a6fb0","#c98a2e","#8e5fc9","#c94f8e","#4f9fc9","#7a9a3c"];
function hashName(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h;
}
function avatarColor(name){ return AVATAR_COLORS[hashName(name||"匿名") % AVATAR_COLORS.length]; }
function avatarHtml(name, size){
  const n = name || "匿名";
  const initial = n.trim().slice(0,1).toUpperCase();
  return `<span class="avatar ${size==='lg'?'lg':''}" style="background:${avatarColor(n)}">${escapeHtml(initial)}</span>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function fmtTime(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleString("zh-TW", {month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"});
}
function isRecent(ts){
  return !!ts && (Date.now() - ts) < (3 * 24 * 60 * 60 * 1000);
}
function getReplies(topicId, parentId){
  return Object.entries(posts).filter(([id,p]) => p.topicId===topicId && (p.parentId||null)===(parentId||null))
    .sort((a,b) => (a[1].createdAt||0) - (b[1].createdAt||0));
}
function getTopicStats(topicId){
  const all = Object.values(posts).filter(p => p.topicId===topicId);
  const count = all.length;
  const last = all.reduce((max,p) => Math.max(max, p.createdAt||0), 0);
  return {count, last};
}
function updateStats(){
  document.getElementById("stat-topics").textContent = Object.keys(topics).length;
  document.getElementById("stat-posts").textContent = Object.keys(posts).length;
  const people = new Set();
  Object.values(topics).forEach(t => people.add(t.author||"匿名"));
  Object.values(posts).forEach(p => people.add(p.author||"匿名"));
  document.getElementById("stat-people").textContent = people.size;
}

function renderTopicsList(){
  const q = document.getElementById("topic-search").value.trim().toLowerCase();
  const entries = Object.entries(topics).filter(([id,t]) => !q || t.title.toLowerCase().includes(q));
  entries.sort((a,b) => {
    const sa = getTopicStats(a[0]).last || a[1].createdAt || 0;
    const sb = getTopicStats(b[0]).last || b[1].createdAt || 0;
    return sb - sa;
  });
  document.getElementById("topic-count-label").textContent = `共 ${Object.keys(topics).length} 個議題`;
  const list = document.getElementById("topics-list");
  if(entries.length === 0){
    list.innerHTML = '<div class="empty-hint"><span class="big">🏁</span>還沒有議題，點右上角「＋ 新增議題」開始討論吧！</div>';
    return;
  }
  list.innerHTML = entries.map(([id,t]) => {
    const stats = getTopicStats(id);
    const rootPost = getReplies(id, null)[0];
    const preview = rootPost ? rootPost[1].content : "（尚無留言，點擊加入討論）";
    const recent = isRecent(stats.last || t.createdAt);
    return `
      <div class="topic-card ${recent ? 'is-recent' : ''}" data-topic-id="${id}" style="border-top-color:${avatarColor(t.title)}">
        ${isAdmin ? `<button class="topic-delete-btn" data-topic-id="${id}">🗑 刪除議題</button>` : ""}
        <h3>${escapeHtml(t.title)} ${recent ? '<span class="new-badge">🆕 3天內有新動態</span>' : ""}</h3>
        <div class="preview">${escapeHtml(preview)}</div>
        <div class="meta">
          ${avatarHtml(t.author)}
          <span>發起人：<b>${escapeHtml(t.author||"匿名")}</b></span>
          <span>💬 留言數：<b>${stats.count}</b></span>
          <span>🕒 最後更新：${fmtTime(stats.last || t.createdAt)}</span>
        </div>
      </div>
    `;
  }).join("");
  list.querySelectorAll(".topic-card").forEach(card => {
    card.addEventListener("click", () => openThread(card.dataset.topicId));
  });
  list.querySelectorAll(".topic-delete-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      deleteTopic(btn.dataset.topicId);
    });
  });
}
document.getElementById("topic-search").addEventListener("input", renderTopicsList);

document.getElementById("btn-new-topic").onclick = () => {
  document.getElementById("new-topic-title").value = "";
  document.getElementById("new-topic-mask").classList.add("open");
};
document.getElementById("new-topic-cancel").onclick = () => document.getElementById("new-topic-mask").classList.remove("open");
document.getElementById("new-topic-submit").onclick = () => {
  const title = document.getElementById("new-topic-title").value.trim();
  if(!title){ alert("請輸入議題標題"); return; }
  const author = getUserName() || "匿名";
  const topicId = saveTopic({title, author, createdAt: Date.now()});
  document.getElementById("new-topic-mask").classList.remove("open");
  rerenderCurrentView();
  if(!offlineMode){ setTimeout(() => openThread(topicId), 300); } else { openThread(topicId); }
};

let currentTopicId = null;

function openThread(topicId){
  currentTopicId = topicId;
  document.getElementById("topics-view").style.display = "none";
  document.getElementById("thread-view").style.display = "block";
  document.getElementById("top-reply-content").value = "";
  renderThread(topicId);
}
document.getElementById("btn-back").onclick = () => {
  currentTopicId = null;
  document.getElementById("thread-view").style.display = "none";
  document.getElementById("topics-view").style.display = "block";
  renderTopicsList();
};

function renderThread(topicId){
  const t = topics[topicId];
  if(!t){ document.getElementById("btn-back").click(); return; }
  const stats = getTopicStats(topicId);
  document.getElementById("thread-title").textContent = t.title;
  document.getElementById("thread-meta").innerHTML =
    `${avatarHtml(t.author)} 發起人：${escapeHtml(t.author||"匿名")} ・ 建立於 ${fmtTime(t.createdAt)} ・ 共 ${stats.count} 則留言`;
  document.getElementById("posts-container").innerHTML = renderPostTree(topicId, null, 0);
  attachPostEvents();

  const deleteTopicBtn = document.getElementById("btn-delete-topic");
  deleteTopicBtn.style.display = isAdmin ? "inline-block" : "none";
  deleteTopicBtn.onclick = () => deleteTopic(topicId);
}

function renderPostTree(topicId, parentId, depth){
  const replies = getReplies(topicId, parentId);
  if(replies.length === 0) return "";
  const depthColor = AVATAR_COLORS[depth % AVATAR_COLORS.length];
  return replies.map(([id,p]) => {
    const canDelete = (p.author === getUserName()) || isAdmin;
    const recent = isRecent(p.createdAt);
    return `
    <div class="post" data-post-id="${id}" style="--depth-color:${depthColor}">
      <div class="post-card ${recent ? 'is-recent' : ''}">
        <div class="post-meta">${avatarHtml(p.author)}<span class="author">${escapeHtml(p.author||"匿名")}</span><span>${fmtTime(p.createdAt)}</span>${recent ? '<span class="new-badge">🆕 New</span>' : ""}</div>
        <div class="post-content">${escapeHtml(p.content)}</div>
        <div class="post-actions">
          <button class="reply-toggle-btn">↩ 回覆</button>
          ${canDelete ? `<button class="delete-post-btn danger-text">🗑 刪除${isAdmin && p.author!==getUserName() ? "（管理者）" : ""}</button>` : ""}
        </div>
        <div class="reply-box">
          <textarea rows="2" placeholder="回覆 ${escapeHtml(p.author||"匿名")} 的留言…"></textarea>
          <button class="btn primary small reply-submit-btn" style="background:var(--accent);color:#fff;border-color:var(--accent);">送出回覆</button>
        </div>
      </div>
      <div class="children">${renderPostTree(topicId, id, depth+1)}</div>
    </div>
  `;
  }).join("");
}

function attachPostEvents(){
  document.querySelectorAll(".reply-toggle-btn").forEach(btn => {
    btn.onclick = () => {
      const box = btn.closest(".post-card").querySelector(".reply-box");
      box.classList.toggle("open");
    };
  });
  document.querySelectorAll(".reply-submit-btn").forEach(btn => {
    btn.onclick = () => {
      const postEl = btn.closest(".post");
      const parentId = postEl.dataset.postId;
      const textarea = btn.closest(".reply-box").querySelector("textarea");
      const content = textarea.value.trim();
      if(!content){ alert("請輸入回覆內容"); return; }
      const author = getUserName() || "匿名";
      savePost({topicId: currentTopicId, parentId, author, content, createdAt: Date.now()});
      textarea.value = "";
      if(offlineMode) renderThread(currentTopicId);
    };
  });
  document.querySelectorAll(".delete-post-btn").forEach(btn => {
    btn.onclick = () => {
      const postId = btn.closest(".post").dataset.postId;
      deletePost(postId);
    };
  });
}

document.getElementById("btn-top-reply").onclick = () => {
  const textarea = document.getElementById("top-reply-content");
  const content = textarea.value.trim();
  if(!content){ alert("請輸入留言內容"); return; }
  const author = getUserName() || "匿名";
  savePost({topicId: currentTopicId, parentId: null, author, content, createdAt: Date.now()});
  textarea.value = "";
  if(offlineMode) renderThread(currentTopicId);
};

document.getElementById("btn-export-excel").onclick = () => {
  const topicIds = Object.keys(topics);
  if(topicIds.length === 0){ alert("目前還沒有任何議題可以匯出"); return; }

  const overviewRows = topicIds.map(id => {
    const t = topics[id];
    const stats = getTopicStats(id);
    return {
      "議題標題": t.title,
      "發起人": t.author || "",
      "建立時間": fmtTime(t.createdAt),
      "留言數": stats.count,
      "最後更新": fmtTime(stats.last || t.createdAt)
    };
  });

  const detailRows = [];
  topicIds.forEach(topicId => {
    const t = topics[topicId];
    function walk(parentId, depth, replyToAuthor){
      getReplies(topicId, parentId).forEach(([id,p]) => {
        const indent = "　".repeat(depth) + (depth > 0 ? "↳ " : "");
        detailRows.push({
          "議題": t.title,
          "層級": depth,
          "內容": indent + p.content,
          "發言人": p.author || "",
          "回覆對象": depth === 0 ? "(議題本身)" : replyToAuthor,
          "發表時間": fmtTime(p.createdAt)
        });
        walk(id, depth+1, p.author);
      });
    }
    walk(null, 0, "");
  });

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.json_to_sheet(overviewRows);
  ws1["!cols"] = [{wch:28},{wch:14},{wch:16},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws1, "議題總覽");

  const ws2 = XLSX.utils.json_to_sheet(detailRows);
  ws2["!cols"] = [{wch:24},{wch:6},{wch:50},{wch:12},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws2, "討論明細");

  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `全國EMBA馬拉松_討論串整理_${today}.xlsx`);
};

updateStats();
renderTopicsList();
</script>
</body>
